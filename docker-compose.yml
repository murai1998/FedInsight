# Local PostgreSQL + pgvector for FedInsight.
#
#   docker compose up -d        # start the database
#   docker compose down         # stop it (keeps data in the named volume)
#   docker compose down -v      # stop and DELETE all data
#
# Connection defaults match .env.example:
#   postgresql://postgres:postgres@localhost:5432/fedinsight
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fedinsight-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fedinsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fedinsight"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
